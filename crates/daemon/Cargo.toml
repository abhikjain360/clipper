[package]
name = "clipper-daemon"
version.workspace = true
edition.workspace = true

[[bin]]
name = "clipper-daemon"
path = "src/main.rs"

[dependencies]
clipper-client.workspace = true
clipper-core.workspace = true
clipper-daemon-types.workspace = true
anyhow = "1.0.102"
dirs = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full", "net", "signal", "io-util"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
uuid = { version = "1.22.0", features = ["v4"] }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3.2.0"
