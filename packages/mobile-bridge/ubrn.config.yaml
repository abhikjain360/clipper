rust:
  directory: ../..
  manifestPath: crates/mobile-uniffi/Cargo.toml

bindings:
  cpp: cpp/generated
  ts: src/generated

android:
  directory: android
  apiLevel: 23
  targets:
    - arm64-v8a
    - x86_64
  jniLibs: src/main/jniLibs
  useSharedLibrary: true

ios:
  directory: ios
  frameworkName: build/ClipperMobile
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
