name: clipper_app
description: "Clipper - Encrypted clipboard & file sync"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  file_picker: ^10.1.8
  rust_lib_clipper_app:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  ffigen: ^20.1.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
