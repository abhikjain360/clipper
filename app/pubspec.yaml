name: clipper_app
description: "Clipper - Encrypted clipboard & file sync"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  file_picker: ^11.0.2
  path: ^1.9.1
